work_in_progress_title = Fejlesztés alatt
work_in_progress_1 = Az SCP: Nine-Tailed Fox egy korai hozzáférésű játék, amely még fejlesztés alatt all. Ez azt jelenti, hogy az idő múlásával fejlődni fog. Emiatt előfordulhatnak hibák, összeomlások, befejezetlen funkciók valamint tartalomhiány. Kérjük hogy legyen türelmes, és csatlakozzon a közösségünkhöz hogy támogassa a játék fejlesztését.
work_in_progress_2 = Köszönjük a megértést.
epilepsy_title = Fényérzékenységi rohamra vonatkoztató figyelmeztetés
epilepsy_1 = Az emberek kis százaléka rohamot tapasztalhat bizonyos vizuális ingerek, például videójátékokban megjelenő villogó fények vagy minták hatására. Ez még azoknál is előfordulhat, akiknek korábban nem volt epilepsziájuk vagy rohamuk, mivel létezhet egy diagnosztizálatlan rendellenesség, amely videójátékok közben úgynevezett „fényérzékeny epilepsziás rohamokat” válthat ki.
epilepsy_2 = Bármilyen tünet jelentkezése esetén azonnal hagyja abba a játékot, és forduljon orvoshoz.
continue = Nyomjon meg egy gombot a folytatáshoz.

