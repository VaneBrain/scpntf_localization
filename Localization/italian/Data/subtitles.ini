[SCP\049\714Equipped]
text = Smetti di opporre resistenza, sono qui per curarti.

[SCP\049\DetectedInChamber]
text = Ah, non sapevo che avessimo ospiti. Raramente riceviamo visite quaggiù.

[SCP\049\Kidnap1]
text = Farà meno male se stai fermo.

[SCP\049\Kidnap2]
text = Ti assicuro che la mia cura è molto efficace.

[SCP\049\Room2SL1]
text = Santo cielo. È peggio di quanto pensassi. Si diffonde a macchia d'olio. Avrebbero dovuto portarmi qui prima.

[SCP\049\Room2SL2]
text = Devo mettermi al lavoro prima che la malattia consumi il resto di queste povere anime.

[SCP\049\Searching1]
text = Lo so, sei qui dentro.

[SCP\049\Searching2]
text = Non c'è bisogno di nascondersi, sono qui per aiutarti.

[SCP\049\Searching3]
text = Sento il tuo respiro.

[SCP\049\Searching4]
text = Vedo che non stai bene. La malattia ti ha sopraffatto.

[SCP\049\Searching5]
text = Non temere, non sto cercando di farti del male.

[SCP\049\Searching6]
text = Percepisco la malattia in te.

[SCP\049\Searching7]
text = [Cantando] Giro giro tondo. Casca il mondo, casca la terra. Tutti giù per terra.

[SCP\049\Spotted1]
text = Oh mio Dio, un'altra vittima della malattia.

[SCP\049\Spotted2]
text = Tu non sei un dottore.

[SCP\049\Spotted3]
text = Io sono la cura.

[SCP\049\Spotted4]
text = Non temere, io sono la cura.

[SCP\049\Spotted5]
text = Eccoti qua.

[SCP\049\Spotted6]
text = Ciao.

[SCP\049\Spotted7]
text = Salve.

[SCP\049\TakeOffHazmat]
text = Adesso togliamo questo strano indumento.