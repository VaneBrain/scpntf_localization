[line_0_1_player]
text = Non si torna più indietro. Facciamolo.

[line_1_1_regular]
text = Questo posto mi mette davvero i brividi... Facciamola finita in fretta.

[line_2_1_medic]
text = Mi chiedo cosa succederà dopo, amico.

[line_2_2_regular]
text = Non lo so. Facciamola finita e basta.

[line_2_3_medic]
text = [Sospiro] Ok.

[line_3_1_medic]
text = Sembra che non ci sia nessuno in giro.

[line_3_2_regular]
text = È tranquillo... Troppo tranquillo. Il mio istinto mi dice che qualcosa non va.

[line_3_3_medic]
text = Eh, il tuo istinto oppure quello che hai mangiato stamattina.

[line_4_1_medic]
text = Ehi, oggi non è mercoledì? Oh! Questo significa che è il giorno della pizza, giusto?!

[line_4_2_regular]
text = Non lo so. Anche se fosse, dubito che ne sia rimasta per noi.

[line_5_1_medic]
text = Ehm... Hai visto?

[line_5_2_regular]
text = Eh?

[line_5_3_medic]
text = Eh, mi sembrava di aver visto qualcosa sfrecciare... Non importa. Credo che la mia maschera si stia appannando.

[line_20_1_medic]
text = Scacco matto.

[line_20_2_regular]
text = Come hai fatto a capirlo? Pensavo che non sapessi giocare.

[line_21_1_medic]
text = Oh! Sembra una cabina per fumatori. Non sapevo che ne avessero una... Ehi, qualcuno ha portato un accendino?

[line_21_2_regular]
text = Fumare sul lavoro non accelererà le cose. Quindi finiamola e basta.

[line_21_3_medic]
text = Sì, probabilmente hai ragione.

[line_100_1_player]
text = [Sospiro] Devono aver tolto la corrente, l'ascensore non funziona...

[line_100_2_medic]
text = Probabilmente fa parte del protocollo di sicurezza. Dovrebbe esserci una sala di manutenzione nelle vicinanze.

[line_100_3_player]
text = Vado a vedere cosa succede. Voi due restate qui a sorvegliare gli ascensori mentre sono via. Nel caso in cui dovessimo ricevere la visita di qualche "ospite" o altro.

[line_101_1_regular]
text = Perché usiamo l'ascensore durante una violazione del contenimento? Le scale sono l'alternativa più sicura in questo momento.

[line_101_2_medic]
text = Cosa c'è? Hai paura che l'ascensore cada? [Ride, poi sospira] Inoltre, questo posto è troppo profondo. I miei piedi mi farebbero male più di qualsiasi altra cosa in tutta questa maledetta struttura.

