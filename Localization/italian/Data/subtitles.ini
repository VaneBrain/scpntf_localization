[Checkpoint_event_medic]
text = Ma che c... Ma che cazzo?! Oh Gesù! [Sparatoria]

[Checkpoint_event_regular]
text = [Urla] Che diavolo è questo?! Merda! State indietro! Non lasciate che vi si avvicini! Cazzo! CAZZO! VAFFANCULO!!!

[Checkpoint_event_radiocutoff]
text = [La radio si interrompe]

[Announc_1]
text = L'unità mobile Epsilon-11, denominata Nine Tailed Fox, è entrata nella struttura. Si consiglia a tutti i sopravvissuti rimasti di rimanere nel rifugio di evacuazione o in qualsiasi altra area sicura fino a quando l'unità non avrà messo in sicurezza la struttura.

[Announc_2]
text = Inizieremo a scortare il personale fuori dall'edificio quando gli SCP fuggiti saranno stati ricatturati.

[AnnouncAfter1]
text = Vorremmo avvisare ancora una volta tutto il personale sopravvissuto: non tentate di raggiungere le uscite. Cercate un'area sicura o recatevi in uno dei numerosi rifugi di evacuazione all'interno della struttura.

[AnnouncAfter2]
text = Avviso a tutto il personale: l'ascensore che porta al Gate B è stato chiuso per garantire la sicurezza delle aree superiori della struttura. Si prega di rimanere all'interno dei rifugi di evacuazione fino a quando la struttura non sarà stata messa in sicurezza.

[ThreatAnnounc1]
text = Soggetto D-9341, presentarsi al posto di controllo di sicurezza più vicino per essere interrogato.

[ThreatAnnounc2]
text = Soggetto D-9341, presentarsi alla forza di sicurezza più vicina. Il mancato rispetto di tale ordine comporterà la cessazione immediata del rapporto di lavoro.

[ThreatAnnounc3]
text = Soggetto D-9341, presentarsi immediatamente al Gate A per essere interrogato.

[ThreatAnnouncPossession]
text = Soggetto D-9341, riferire alla più vicina unità mobile della task force per il recupero di diversi oggetti di grande importanza.

[ThreatAnnouncFinal]
text = Soggetto D-9341 designato per la soppressione.

[Tesla1]
text = Controllo a Nine-Tailed Fox. Portale Tesla disabilitato.

[Tesla2]
text = Controllo a Nine-Tailed Fox. Portale Testa disattivato. Potete passare.

[Tesla3]
text = Controllo a Nine-Tailed Fox. Il Portale Tesla nel vostro settore è in standby. Procedete pure.

